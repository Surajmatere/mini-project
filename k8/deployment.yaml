apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-webapp
  template:
    metadata:
      labels:
        app: nginx-webapp
    spec:
      imagePullSecrets:
        - name: ecr-secret   # 🔥 THIS IS IMPORTANT

      containers:
        - name: nginx-webapp
          image: 732203471374.dkr.ecr.ap-south-1.amazonaws.com/project:17
          ports:
            - containerPort: 80
